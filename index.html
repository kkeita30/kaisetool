<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>解説ボードツクール</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="theme.js"></script>
  <style>
    @font-face { font-family: 'MgenHeavy'; src: url('fonts/mgenplus-2cp-heavy.ttf'); }
    @font-face { font-family: 'MgenBold';  src: url('fonts/mgenplus-2cp-bold.ttf'); }
    @font-face { font-family: 'MgenLight'; src: url('fonts/mgenplus-2cp-light.ttf'); }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0a0a1a; color: #fff; font-family: sans-serif; display: flex; height: 100vh; overflow: hidden; }

    #form {
      width: 400px; flex-shrink: 0; background: #16213e; padding: 20px;
      overflow-y: auto; display: flex; flex-direction: column; gap: 10px;
    }
    #form h1 { font-size: 16px; color: #93c5fd; }
    #form h2 { font-size: 12px; color: #aaa; margin-top: 4px; }
    #form input[type=text], #form textarea, #form select {
      width: 100%; padding: 6px 8px; background: #0f3460; border: 1px solid #444;
      color: #fff; border-radius: 4px; font-size: 13px;
    }
    #form textarea { resize: vertical; min-height: 34px; line-height: 1.5; font-family: sans-serif; }
    .section { display: flex; flex-direction: column; gap: 6px; }
    .divider { border: none; border-top: 1px solid #334; margin: 4px 0; }
    .load-row { display: flex; gap: 6px; align-items: center; }
    .load-row label { font-size: 12px; color: #aaa; white-space: nowrap; }
    .load-row input[type=file] { flex: 1; font-size: 11px; color: #aaa; background: #0f3460; border: 1px solid #444; border-radius: 4px; padding: 4px; }
    .line-card { background: #0f3460; border-radius: 6px; padding: 8px; display: flex; flex-direction: column; gap: 6px; }
    .line-card-row { display: flex; gap: 4px; align-items: center; }
    .line-card select { flex: 1; }
    button { border: none; border-radius: 4px; cursor: pointer; font-size: 12px; padding: 4px 8px; }
    .btn-move   { background: #333; color: #fff; }
    .btn-del    { background: #7f1d1d; color: #fff; }
    .btn-add    { background: #533483; color: #fff; padding: 8px; font-size: 14px; }
    .btn-export     { background: #f5b500; color: #000; padding: 10px; font-size: 15px; font-weight: bold; }
    .btn-export-all { background: #b45309; color: #fff; padding: 10px; font-size: 15px; font-weight: bold; }
    .export-progress { font-size: 13px; color: #fbbf24; text-align: center; padding: 6px 0; }
    .btn-save       { background: #166534; color: #fff; padding: 10px; font-size: 15px; font-weight: bold; }
    .btn-chap-add   { background: #1e40af; color: #fff; padding: 8px; font-size: 13px; }
    .btn-chap-del   { background: #7f1d1d; color: #fff; padding: 8px; font-size: 13px; }
    .chap-actions   { display: flex; gap: 6px; }
    .badge { font-size: 11px; background: #1d4ed8; color: #fff; border-radius: 3px; padding: 2px 6px; }
    .badge-dirty { font-size: 11px; background: #92400e; color: #fff; border-radius: 3px; padding: 2px 6px; }

    #preview-wrap {
      flex: 1; display: flex; align-items: center; justify-content: center;
      background: #111; overflow: hidden;
    }
    .checker {
      flex-shrink: 0; overflow: hidden; position: relative;
      background-image:
        linear-gradient(45deg,#2a2a2a 25%,transparent 25%),
        linear-gradient(-45deg,#2a2a2a 25%,transparent 25%),
        linear-gradient(45deg,transparent 75%,#2a2a2a 75%),
        linear-gradient(-45deg,transparent 75%,#2a2a2a 75%);
      background-size: 16px 16px;
      background-position: 0 0,0 8px,8px -8px,-8px 0;
    }
    .board-frame { width: 1920px; height: 1080px; transform-origin: top left; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef, useEffect } = React;

    const FORM_WIDTH = 400; // フォームパネルの幅(px)

    function usePreviewScale() {
      const calc = () => Math.min((window.innerWidth - FORM_WIDTH) / 1920, window.innerHeight / 1080);
      const [scale, setScale] = useState(calc);
      useEffect(() => {
        const onResize = () => setScale(calc());
        window.addEventListener('resize', onResize);
        return () => window.removeEventListener('resize', onResize);
      }, []);
      return scale;
    }

    const TYPES = [
      { value: 'midashi', label: '▼ 見出し' },
      { value: 'point',   label: '⇒ ポイント' },
      { value: 'indent',  label: '　字下げ' },
      { value: 'plain',   label: '平文' },
      { value: 'empty',   label: '空行' },
    ];

    // boards.json の内部マーカー（固定）
    const MARKER = { midashi: '▼', point: '⇒', indent: '　' };

    // フォーム用オブジェクト配列 → lines文字列配列
    function formToLines(lines) {
      return lines.map(l => {
        if (l.type === 'empty')   return '';
        if (l.type === 'midashi') return MARKER.midashi + l.text;
        if (l.type === 'point')   return MARKER.point   + l.text;
        if (l.type === 'indent')  return MARKER.indent  + l.text;
        return l.text;
      });
    }

    // lines文字列配列 → フォーム用オブジェクト配列
    function linesToForm(lines) {
      if (!lines) return [];
      return lines.map(str => {
        if (str === '')                          return { type: 'empty',   text: '' };
        if (str.startsWith(MARKER.midashi))      return { type: 'midashi', text: str.slice(MARKER.midashi.length) };
        if (str.startsWith(MARKER.point))        return { type: 'point',   text: str.slice(MARKER.point.length) };
        if (str.startsWith(MARKER.indent))       return { type: 'indent',  text: str.slice(MARKER.indent.length) };
        return { type: 'plain', text: str };
      });
    }

    // ── プレビュー ──────────────────────────────────────────────
    function LinePreview({ line }) {
      const T = window.THEME;
      if (line.type === 'empty') return <div style={{ height: 20 }} />;
      const text = line.text || '';
      if (line.type === 'midashi') return (
        <div style={{ fontFamily: T.midashiFont, fontSize: T.midashiSize, color: T.midashiColor, lineHeight: 1.4, display: 'flex', gap: T.prefixGap }}>
          <span style={{ flexShrink: 0 }}>{T.midashiPrefix}</span>
          <span style={{ whiteSpace: 'pre-wrap' }}>{text}</span>
        </div>
      );
      if (line.type === 'point') return (
        <div style={{ fontFamily: T.pointFont, fontSize: T.pointSize, color: T.pointColor, WebkitTextStroke: T.pointStroke, lineHeight: 1.4, display: 'flex', gap: T.prefixGap }}>
          <span style={{ flexShrink: 0 }}>{T.pointPrefix}</span>
          <span style={{ whiteSpace: 'pre-wrap' }}>{text}</span>
        </div>
      );
      if (line.type === 'indent') return (
        <div style={{ fontFamily: T.indentFont, fontSize: T.indentSize, color: T.indentColor, lineHeight: 1.4, paddingLeft: T.indentPadding, whiteSpace: 'pre-wrap' }}>　{text}</div>
      );
      return (
        <div style={{ fontFamily: T.plainFont, fontSize: T.plainSize, color: T.plainColor, lineHeight: 1.4, whiteSpace: 'pre-wrap' }}>{text}</div>
      );
    }

    function Board({ title, lines, boardRef }) {
      const T = window.THEME;
      return (
        <div ref={boardRef} style={{ width: T.boardW, height: T.boardH, background: 'transparent', position: 'relative' }}>
          <div style={{
            position: 'absolute', top: T.panelTop, left: T.panelLeft, width: T.panelWidth,
            padding: T.panelPadding, display: 'flex', flexDirection: 'column', gap: T.lineGap,
          }}>
            <div style={{
              fontFamily: T.titleFont, fontSize: T.titleSize, color: T.titleColor, lineHeight: 1.4,
              marginBottom: 12, borderBottom: '2px solid rgba(255,255,255,0.25)', paddingBottom: 12,
            }}>
              {title || 'チャプタータイトル'}
            </div>
            {lines.map((line, i) => <LinePreview key={i} line={line} />)}
          </div>
        </div>
      );
    }

    // ── メインアプリ ────────────────────────────────────────────
    function App() {
      const [title, setTitle]   = useState('');
      const [lines, setLines]   = useState([{ type: 'midashi', text: '' }]);
      const [boards, setBoards] = useState(null); // 読み込んだboards.json（不変・ロールバック用）
      const [tempBoards, setTempBoards] = useState({}); // 編集中の作業コピー { [idx]: {title, lines} }
      const [chapIdx, setChapIdx] = useState(0);
      const [exportState, setExportState] = useState(null); // { queue, idx } | null
      const [themeVersion, setThemeVersion] = useState(0); // theme再読み込みトリガー
      const boardRef = useRef(null);
      const previewScale = usePreviewScale();

      // 一括書き出し：exportState が変わるたびに1枚キャプチャして次へ
      useEffect(() => {
        if (!exportState) return;
        const { queue, idx } = exportState;
        const timer = setTimeout(() => {
          html2canvas(boardRef.current, {
            width: 1920, height: 1080, scale: 1,
            backgroundColor: null, useCORS: true, allowTaint: true,
          }).then(canvas => {
            const a = document.createElement('a');
            const num = String(idx + 1).padStart(2, '0');
            a.download = `board_${num}_${queue[idx].title}.png`;
            a.href = canvas.toDataURL('image/png');
            a.click();
            if (idx + 1 < queue.length) {
              setExportState({ queue, idx: idx + 1 });
            } else {
              setExportState(null);
            }
          });
        }, 150); // Reactの再描画を待つ
        return () => clearTimeout(timer);
      }, [exportState]);

      // 起動時に boards.json を自動読み込み
      useEffect(() => {
        fetch('./boards.json')
          .then(r => r.json())
          .then(data => {
            setBoards(data);
            const entry = data[0];
            if (entry) {
              setTitle(entry.title || '');
              setLines(linesToForm(entry.lines) || [{ type: 'midashi', text: '' }]);
            }
          })
          .catch(() => {}); // ファイルがなければ何もしない
      }, []);

      // ファイル読み込み
      const readFile = (file) => new Promise((res, rej) => {
        const r = new FileReader();
        r.onload = e => res(e.target.result);
        r.onerror = rej;
        r.readAsText(file, 'utf-8');
      });

      const onLoadTheme = async (e) => {
        try {
          const src = await readFile(e.target.files[0]);
          new Function(src)(); // window.THEME を上書き実行
          setThemeVersion(v => v + 1); // 再描画トリガー
        } catch(err) { alert('テーマ読み込みエラー: ' + err.message); }
      };

      const onLoadBoards = async (e) => {
        try {
          const src = await readFile(e.target.files[0]);
          const data = JSON.parse(src);
          setBoards(data);
          setTempBoards({});
          setChapIdx(0);
          applyBoard(data, 0);
        } catch(err) { alert('読み込みエラー: ' + err.message); }
      };

      // チャプターをフォームに展開
      const applyBoard = (data, idx) => {
        const entry = data[idx];
        if (!entry) return;
        setTitle(entry.title || '');
        setLines(linesToForm(entry.lines) || [{ type: 'midashi', text: '' }]);
      };

      const onSelectChap = (idx) => {
        // 現在の編集内容を tempBoards に書き込む
        const newTemp = {
          ...tempBoards,
          [chapIdx]: { title, lines: lines.length ? formToLines(lines) : null },
        };
        setTempBoards(newTemp);
        setChapIdx(idx);
        // tempBoards にあればそちら、なければ boards から読み込む
        const entry = newTemp[idx] ?? boards?.[idx];
        if (entry) {
          setTitle(entry.title || '');
          setLines(linesToForm(entry.lines) || [{ type: 'midashi', text: '' }]);
        }
      };


      // チャプター追加・削除
      const addChap = () => {
        const newChap = { title, lines: lines.length ? formToLines(lines) : null };
        const newBoards = [
          ...(boards || []).slice(0, chapIdx + 1),
          newChap,
          ...(boards || []).slice(chapIdx + 1),
        ];
        // tempBoards のインデックスを再マップ（chapIdx+1 以降を +1 ずらす）
        const newTemp = {};
        Object.entries(tempBoards).forEach(([k, v]) => {
          const i = Number(k);
          newTemp[i <= chapIdx ? i : i + 1] = v;
        });
        setBoards(newBoards);
        setTempBoards(newTemp);
        setChapIdx(chapIdx + 1);
        // フォームは現在の編集内容のまま（新チャプターとして継続編集）
      };

      const deleteChap = () => {
        if ((boards || []).length <= 1) { alert('チャプターが1件のみのため削除できません'); return; }
        if (!confirm(`「${title}」を削除しますか？`)) return;
        const newBoards = (boards || []).filter((_, i) => i !== chapIdx);
        // tempBoards のインデックスを再マップ（chapIdx を除去、以降を -1 ずらす）
        const newTemp = {};
        Object.entries(tempBoards).forEach(([k, v]) => {
          const i = Number(k);
          if (i < chapIdx) newTemp[i] = v;
          else if (i > chapIdx) newTemp[i - 1] = v;
        });
        const newIdx = Math.min(chapIdx, newBoards.length - 1);
        setBoards(newBoards);
        setTempBoards(newTemp);
        setChapIdx(newIdx);
        const entry = newTemp[newIdx] ?? newBoards[newIdx];
        if (entry) {
          setTitle(entry.title || '');
          setLines(linesToForm(entry.lines) || [{ type: 'midashi', text: '' }]);
        }
      };

      // 行操作
      const addLine    = () => setLines(p => [...p, { type: 'plain', text: '' }]);
      const deleteLine = (i) => setLines(p => p.filter((_, j) => j !== i));
      const moveLine   = (i, dir) => setLines(p => {
        const a = [...p], j = i + dir;
        if (j < 0 || j >= a.length) return a;
        [a[i], a[j]] = [a[j], a[i]]; return a;
      });
      const updateLine = (i, key, val) => setLines(p => {
        const a = [...p]; a[i] = { ...a[i], [key]: val }; return a;
      });

      const saveJson = () => {
        // tempBoards（編集中）を boards にマージ。現チャプターの編集も含める
        const allTemp = { ...tempBoards, [chapIdx]: { title, lines: lines.length ? formToLines(lines) : null } };
        const merged = (boards || []).map((b, i) => allTemp[i] ?? b);
        const data = merged.length ? merged : [{ title, lines: formToLines(lines) }];
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
        const a = document.createElement('a');
        a.download = 'boards.json';
        a.href = URL.createObjectURL(blob);
        a.click();
        URL.revokeObjectURL(a.href);
        // 保存後に boards を最新状態に更新し tempBoards をクリア
        setBoards(merged);
        setTempBoards({});
      };

      const exportAllPng = () => {
        // tempBoards を boards にマージして全チャプターのキューを作成
        const allTemp = { ...tempBoards, [chapIdx]: { title, lines: lines.length ? formToLines(lines) : null } };
        const queue = (boards || []).map((b, i) => allTemp[i] ?? b);
        setExportState({ queue, idx: 0 });
      };

      const exportPng = () => {
        html2canvas(boardRef.current, {
          width: 1920, height: 1080, scale: 1,
          backgroundColor: null, useCORS: true, allowTaint: true,
        }).then(canvas => {
          const a = document.createElement('a');
          a.download = `board_${title || 'chapter'}.png`;
          a.href = canvas.toDataURL('image/png');
          a.click();
        });
      };

      return (
        <div style={{ display: 'flex', flexDirection: 'row', width: '100vw', height: '100vh', overflow: 'hidden' }}>

          {/* キャプチャ用（画面外・等倍・transformなし） */}
          {(() => {
            const t = exportState ? exportState.queue[exportState.idx].title : title;
            const l = exportState ? linesToForm(exportState.queue[exportState.idx].lines || []) : lines;
            return (
              <div style={{ position: 'fixed', left: -9999, top: -9999, width: 1920, height: 1080, pointerEvents: 'none' }}>
                <Board title={t} lines={l} boardRef={boardRef} />
              </div>
            );
          })()}

          {/* プレビュー（表示用・縮小） */}
          <div id="preview-wrap">
            <div className="checker" style={{ width: 1920 * previewScale, height: 1080 * previewScale }}>
              <div className="board-frame" style={{ transform: `scale(${previewScale})` }}>
                <Board title={title} lines={lines} boardRef={null} />
              </div>
            </div>
          </div>

          {/* フォーム */}
          <div id="form">
            <h1>解説ボードツクール</h1>

            {/* ── ファイル読み込み ── */}
            <div className="section">
              <h2>JSONファイル読み込み {boards && <span className="badge">{boards.length}件</span>}</h2>
              <div className="load-row">
                <label>別ファイルを読む</label>
                <input type="file" accept=".json" onChange={onLoadBoards} />
              </div>
              <h2 style={{ marginTop: 4 }}>テーマ読み込み</h2>
              <div className="load-row">
                <label>theme.js を読む</label>
                <input type="file" accept=".js" onChange={onLoadTheme} />
              </div>
            </div>

            {/* ── チャプター選択 ── */}
            {boards && (
              <div className="section">
                <h2>
                  チャプター選択
                  {Object.keys(tempBoards).length > 0 && (
                    <span className="badge-dirty" style={{ marginLeft: 6 }}>編集中あり</span>
                  )}
                </h2>
                <select value={chapIdx} onChange={e => onSelectChap(Number(e.target.value))}>
                  {boards.map((b, i) => (
                    <option key={i} value={i}>{tempBoards[i] ? '● ' : ''}{i + 1}. {i === chapIdx ? title : b.title}</option>
                  ))}
                </select>
                <div className="chap-actions">
                  <button className="btn-chap-add" onClick={addChap}>＋ チャプターを追加</button>
                  <button className="btn-chap-del" onClick={deleteChap}>このチャプターを削除</button>
                </div>
              </div>
            )}

            <hr className="divider" />

            {/* ── タイトル ── */}
            <div className="section">
              <h2>チャプタータイトル</h2>
              <input type="text" value={title} onChange={e => setTitle(e.target.value)} placeholder="タイトルを入力" />
            </div>

            {/* ── テキスト行 ── */}
            <h2>テキスト行</h2>
            {lines.map((line, i) => (
              <div key={i} className="line-card">
                <div className="line-card-row">
                  <select value={line.type} onChange={e => updateLine(i, 'type', e.target.value)}>
                    {TYPES.map(t => <option key={t.value} value={t.value}>{t.label}</option>)}
                  </select>
                  <button className="btn-move" onClick={() => moveLine(i, -1)}>↑</button>
                  <button className="btn-move" onClick={() => moveLine(i, 1)}>↓</button>
                  <button className="btn-del"  onClick={() => deleteLine(i)}>✕</button>
                </div>
                {line.type !== 'empty' && (
                  <textarea value={line.text}
                    onChange={e => updateLine(i, 'text', e.target.value)}
                    placeholder="テキストを入力"
                    rows={line.text.split('\n').length}
                  />
                )}
              </div>
            ))}

            <button className="btn-add" onClick={addLine}>＋ 行を追加</button>
            <button className="btn-export" onClick={exportPng} disabled={!!exportState}>PNG書き出し</button>
            <button className="btn-export-all" onClick={exportAllPng} disabled={!!exportState || !boards}>
              {exportState ? `書き出し中… ${exportState.idx + 1} / ${exportState.queue.length}` : '全チャプター一括書き出し'}
            </button>
            <button className="btn-save" onClick={saveJson} disabled={!!exportState}>JSONを保存</button>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
